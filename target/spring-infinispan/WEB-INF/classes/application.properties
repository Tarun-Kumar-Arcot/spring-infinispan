# Application
spring.application.name=spring-infinispan

# Infinispan embedded cache (JBoss EAP's Infinispan JARs, programmatic config)
infinispan.cache.name=custom-cache
infinispan.store.location=/tmp/infinispan-store

# Logging
logging.level.org.infinispan=INFO
logging.level.com.example.springinfinispan=DEBUG
